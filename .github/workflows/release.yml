name: "Release"

on:
  push:
    branches:
      - beta
      - main

jobs:
  release:
    name: "Release"
    permissions:
      contents: write # to be able to publish a github release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: "🛎 Checkout"
        uses: actions/checkout@v4
      - name: "📦 Install yq" # used to update the issue template
        uses: ./.github/actions/install-yq
      - name: "🔧 Setup pnpm"
        uses: pnpm/action-setup@v4
      - name: "🔧 Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - name: "📦 Install"
        run: |
          pnpm add semantic-release @semantic-release/{changelog,commit-analyzer,exec,git,github,release-notes-generator}
      - name: "🦫 Install Go dependencies"
        uses: ./.github/actions/use-go-dependencies
      - name: "🔖 Release"
        env:
          # appears on the release commits
          GIT_AUTHOR_NAME: kibi-bot
          GIT_AUTHOR_EMAIL: builders@kibis.is
          GIT_COMMITTER_NAME: kibi-bot
          GIT_COMMITTER_EMAIL: builders@kibis.is
          # used to push the release commit and create the tags
          GITHUB_TOKEN: ${{ secrets.READ_AND_WRITE_REPOS_TOKEN }}
        run: pnpm exec semantic-release
